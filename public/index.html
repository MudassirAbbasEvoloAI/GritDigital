<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Grit Digital — Full-service digital marketing agency. Strategy, creative production, AI content, web development, and more."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Grit Digital</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .splash-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
      }
      .splash-diamond {
        width: 32px;
        height: 32px;
        background: #ea580c;
        border-radius: 4px;
        transform: rotate(45deg);
        position: relative;
      }
      .splash-diamond::after {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        background: #09090b;
        border-radius: 3px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-45deg);
      }
      .splash-name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.02em;
      }
      .splash-name span { color: #f97316; }
      .splash-bar {
        width: 180px;
        height: 2px;
        background: #27272a;
        border-radius: 2px;
        overflow: hidden;
      }
      .splash-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: #ea580c;
        border-radius: 2px;
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body style="background:#09090b;margin:0">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-diamond"></div>
        <div class="splash-name">Grit <span>Digital</span></div>
      </div>
      <div class="splash-bar"></div>
    </div>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
